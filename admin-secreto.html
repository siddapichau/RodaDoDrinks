<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Roda dos Drinks</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/png" href="logo.png">
</head>
<body>
    <div class="admin-container">
        <header>
            <img src="logo.png" alt="Logo" style="width: 50px;">
            <h2>Painel Admin - Drinks</h2>
            <a href="index.html" class="btn-voltar">Voltar para Roleta</a>
        </header>

        <section class="admin-form">
            <h3>Adicionar Novo Drink</h3>
            <form id="formDrink">
                <input type="text" id="nomeDrink" placeholder="Nome do Drink (ex: Caipirinha)" required>
                <input type="color" id="corDrink" value="#8A2BE2" title="Cor na Roleta">
                <textarea id="receitaDrink" placeholder="Ingredientes e Modo de Preparo..." required></textarea>
                <select id="tipoDrink">
                    <option value="alcoolico">Alcoólico</option>
                    <option value="sem-alcool">Sem Álcool</option>
                </select>
                <button type="submit" class="btn-acao">Salvar no Firebase</button>
            </form>
        </section>

        <section class="admin-lista">
            <h3>Drinks Cadastrados</h3>
            <ul id="listaDrinksAdmin">
                <!-- Preenchido pelo JS via Firebase -->
            </ul>
        </section>
    </div>

    <script type="module" src="firebase.js"></script>
    <!-- Script específico do admin vai aqui (geralmente no core.js ou admin.js) -->
    <script type="module" src="core.js"></script>
</body>
</html>
